business_value: Enables creative teams to rapidly iterate on video concepts by automatically
  generating diverse variations and providing technical quality metrics. This accelerates
  the pre-production phase and ensures that generated content meets technical standards,
  ultimately reducing the time-to-market for video-based marketing materials.
technical_value: Demonstrates an orchestrated workflow using FastAPI, Vertex AI (Gemini,
  Veo), and Cloud Run with GCS FUSE. It incorporates technical quality evaluation
  (NIQE) and content provenance verification (C2PA), showcasing a robust and enterprise-ready
  approach to generative video production.
